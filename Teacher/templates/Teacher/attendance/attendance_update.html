{% extends "Teacher/base.html" %}

{% block content %}

<div class="container mt-4">

    <h2>Update Attendance</h2>

    <form method="post">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="btn btn-primary">
            Update
        </button>

        <a href="{% url 'attendance_list' %}" class="btn btn-secondary">
            Cancel
        </a>

    </form>

</div>

{% endblock %}
