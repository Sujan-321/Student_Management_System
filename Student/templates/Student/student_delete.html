{% extends "Student/base.html" %}

{% block content %}

<div class="card shadow">

<div class="card-body">

<h3>

Delete Student

</h3>

<hr>

<p>

Are you sure you want to delete

<strong>

{{ student.first_name }} {{ student.last_name }}

</strong>

?

</p>

<form method="post">

{% csrf_token %}

<button class="btn btn-danger">

Delete

</button>

<a href="{% url 'student_list' %}"
class="btn btn-secondary">

Cancel

</a>

</form>

</div>

</div>

{% endblock %}
