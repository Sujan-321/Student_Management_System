{% extends "Student/base.html" %}

{% block content %}

<div class="container mt-4">

<h2>{{ assignment.title }}</h2>

<p>

{{ assignment.desc }}

</p>

<hr>

<h4>Upload PDF</h4>

<form
method="post"
enctype="multipart/form-data"
action="{% url 'assignment_upload' assignment.id %}">

{% csrf_token %}

{{ form.as_p }}

<button
class="btn btn-success">

Upload

</button>

</form>

<hr>

<h4>My Submitted Files</h4>

<table class="table table-bordered">

<tr>

<th>PDF</th>

<th>Date</th>

<th></th>

</tr>

{% for file in files %}

<tr>

<td>

<a
href="{{ file.pdf.url }}"
target="_blank">

View PDF

</a>

</td>

<td>

{{ file.submitted_at }}

</td>

<td>

<a
href="{% url 'submission_delete' file.id %}"
class="btn btn-danger btn-sm">

Delete

</a>

</td>

</tr>

{% empty %}

<tr>

<td colspan="3">

No submission yet.

</td>

</tr>

{% endfor %}

</table>

</div>

{% endblock %}
